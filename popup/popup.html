<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Rufus信息抓取工具</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 Amazon Rufus信息抓取工具</h1>
            <p class="subtitle">v1.0.0 | 商品页 Ask Rufus 抓取</p>
        </div>

        <!-- URL Input Section -->
        <div class="section input-section">
            <div class="section-header">
                <h2>📁 URL导入</h2>
            </div>
            <div class="input-group">
                <textarea id="urlInput" placeholder="请粘贴Amazon商品页URL或ASIN，每行一个&#10;例如：&#10;https://www.amazon.com/dp/B0D2R3KRFN?th=1&#10;B0D2R3KRFN"></textarea>
                <div class="button-group">
                    <button id="loadFromFile" class="btn btn-secondary">📂 从文件导入</button>
                    <button id="clearUrls" class="btn btn-secondary">🗑️ 清空</button>
                </div>
            </div>
            <div class="url-stats">
                <span id="urlCount">已导入: 0 个URL</span>
            </div>
        </div>

        <!-- Settings Section -->
        <div class="section settings-section">
            <div class="section-header">
                <h2>⚙️ 抓取设置</h2>
            </div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="delayMin">最小延迟 (秒)</label>
                    <input type="number" id="delayMin" value="2" min="1" max="30">
                </div>
                <div class="setting-item">
                    <label for="delayMax">最大延迟 (秒)</label>
                    <input type="number" id="delayMax" value="5" min="1" max="60">
                </div>
                <div class="setting-item">
                    <label for="batchSize">批次大小</label>
                    <input type="number" id="batchSize" value="25" min="5" max="100" title="实际批次大小将在此值基础上 ±20% 随机">
                </div>
                <div class="setting-item">
                    <label for="restTime">批次休息 (秒)</label>
                    <input type="number" id="restTime" value="60" min="10" max="300" title="实际休息时间将在此值基础上 ±20% 随机">
                </div>
            </div>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="enableAntiDetection" checked>
                    <span title="随机延迟 + 模拟行为">防检测</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="enableRetry" checked>
                    <span title="失败后最多重试3次">自动重试</span>
                </label>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="section progress-section">
            <div class="section-header">
                <h2>📊 抓取进度</h2>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progressBar" class="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span id="progressPercent">0%</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">总任务</div>
                    <div id="statTotal" class="stat-value">0</div>
                </div>
                <div class="stat-item success">
                    <div class="stat-label">成功</div>
                    <div id="statSuccess" class="stat-value">0</div>
                </div>
                <div class="stat-item error">
                    <div class="stat-label">失败</div>
                    <div id="statFailed" class="stat-value">0</div>
                </div>
                <div class="stat-item pending">
                    <div class="stat-label">待处理</div>
                    <div id="statPending" class="stat-value">0</div>
                </div>
            </div>
            <div class="status-message">
                <span id="statusMessage">等待开始...</span>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="control-section">
            <button id="startBtn" class="btn btn-primary btn-large">▶️ 开始抓取</button>
            <button id="pauseBtn" class="btn btn-warning btn-large" style="display: none;">⏸️ 暂停</button>
            <button id="resumeBtn" class="btn btn-primary btn-large" style="display: none;">▶️ 继续</button>
            <button id="stopBtn" class="btn btn-danger btn-large" style="display: none;">⏹️ 停止</button>
        </div>

        <!-- Data Export Section -->
        <div class="section export-section">
            <div class="section-header">
                <h2>💾 数据导出</h2>
            </div>
            <div class="export-group">
                <button id="exportCsv" class="btn btn-success">📊 导出CSV</button>
                <button id="exportJson" class="btn btn-success">📋 导出JSON</button>
                <button id="clearData" class="btn btn-secondary">🗑️ 清空数据</button>
            </div>
            <div class="data-info">
                <span id="dataCount">已抓取数据: 0 条</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>💡 提示：抓取过程中请勿关闭浏览器</p>
            <p class="footer-note">支持断点续传 | 自动保存进度</p>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".txt,.csv" style="display: none;">

    <script src="popup.js"></script>
</body>
</html>
