<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexai</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="brand-lockup">
                <img src="../icons/icon48.png" alt="alexai" width="32" height="32">
                <div>
                    <div class="brand-name">alexai</div>
                    <div class="brand-subtitle">Amazon 商品信息工具</div>
                </div>
            </div>
            <div class="header-meta">
                <span id="planBadge" class="plan-badge free">免费版</span>
                <span class="version-label">v1.0.0</span>
            </div>
        </header>

        <main>
            <section id="scraperWorkspace" class="workspace" aria-labelledby="scraperWorkspaceTitle">
                <section id="alexaLicensePanel" class="license-panel" aria-labelledby="alexaLicenseTitle">
                    <div>
                        <div class="license-title-row">
                            <strong id="alexaLicenseTitle">Alexa / Rufus 抓取</strong>
                            <span class="pro-label">PRO</span>
                        </div>
                        <p>图片和视频下载免费使用；批量抓取需要有效授权码。</p>
                    </div>
                    <div class="license-row">
                        <input id="alexaLicenseCode" type="password" autocomplete="off" placeholder="输入授权码">
                        <button id="activateAlexaLicense" class="btn btn-primary" type="button">激活高级版</button>
                        <button id="clearAlexaLicense" class="btn btn-quiet" type="button" hidden>移除授权</button>
                    </div>
                    <div id="alexaLicenseStatus" class="inline-status" aria-live="polite">尚未授权</div>
                </section>

                <div class="workspace-grid">
                    <div class="workspace-main">
                        <section class="work-section input-section">
                            <div class="section-heading">
                                <div>
                                    <h1 id="scraperWorkspaceTitle">Alexa / Rufus 批量抓取</h1>
                                    <p>每行一个 Amazon 商品链接或 ASIN</p>
                                </div>
                                <span id="urlCount" class="count-label">0 个链接</span>
                            </div>
                            <div class="input-group">
                                <textarea id="urlInput" placeholder="https://www.amazon.com/dp/B0D2R3KRFN?th=1&#10;B0D2R3KRFN"></textarea>
                                <div class="button-stack">
                                    <button id="loadFromFile" class="btn btn-secondary" type="button">导入文件</button>
                                    <button id="clearUrls" class="btn btn-quiet" type="button">清空</button>
                                </div>
                            </div>
                        </section>

                        <details class="work-section advanced-section">
                            <summary>任务与页面下载设置</summary>
                            <div class="settings-grid">
                                <label class="setting-item">
                                    <span>最小延迟（秒）</span>
                                    <input type="number" id="delayMin" value="2" min="1" max="30">
                                </label>
                                <label class="setting-item">
                                    <span>最大延迟（秒）</span>
                                    <input type="number" id="delayMax" value="5" min="1" max="60">
                                </label>
                                <label class="setting-item">
                                    <span>最小窗口</span>
                                    <input type="number" id="minConcurrentWindows" value="2" min="2" max="5">
                                </label>
                                <label class="setting-item">
                                    <span>最大窗口</span>
                                    <input type="number" id="maxConcurrentWindows" value="5" min="2" max="5">
                                </label>
                                <label class="setting-item">
                                    <span>批次大小</span>
                                    <input type="number" id="batchSize" value="25" min="5" max="100">
                                </label>
                                <label class="setting-item">
                                    <span>批次休息（秒）</span>
                                    <input type="number" id="restTime" value="60" min="10" max="300">
                                </label>
                            </div>
                            <div class="setting-toggles">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="enableAntiDetection" checked>
                                    <span>保持访问节奏</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="enableRetry" checked>
                                    <span>失败自动重试</span>
                                </label>
                            </div>
                            <div class="download-settings-inline">
                                <div class="subsection-label">免费页面下载</div>
                                <label class="setting-item compact-setting">
                                    <span>显示方式</span>
                                    <select id="imageDownloadDisplayMode">
                                        <option value="hover">悬停显示</option>
                                        <option value="visible">直接显示</option>
                                    </select>
                                </label>
                                <label class="setting-item compact-setting">
                                    <span>图片清晰度</span>
                                    <select id="imageDownloadQualityMode">
                                        <option value="high">仅高清 HD</option>
                                        <option value="both">高清 + 标清</option>
                                    </select>
                                </label>
                                <label class="checkbox-item compact-check">
                                    <input type="checkbox" id="imageDownloadDetectionEnabled" checked>
                                    <span>启用图片和视频按钮</span>
                                </label>
                            </div>
                        </details>

                        <div class="control-section">
                            <button id="startBtn" class="btn btn-primary btn-large" type="button" disabled>开始高级抓取</button>
                            <button id="pauseBtn" class="btn btn-warning btn-large" type="button" style="display: none;">暂停</button>
                            <button id="resumeBtn" class="btn btn-primary btn-large" type="button" style="display: none;">继续</button>
                            <button id="stopBtn" class="btn btn-danger btn-large" type="button" style="display: none;">停止</button>
                        </div>
                    </div>

                    <aside class="workspace-side">
                        <section class="work-section progress-section">
                            <div class="section-heading compact-heading">
                                <div>
                                    <h2>抓取进度</h2>
                                    <p id="statusMessage">授权后可开始抓取</p>
                                </div>
                                <span id="progressPercent" class="progress-value">0%</span>
                            </div>
                            <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
                            <div class="stats-grid">
                                <div class="stat-item"><span>总任务</span><strong id="statTotal">0</strong></div>
                                <div class="stat-item success"><span>成功</span><strong id="statSuccess">0</strong></div>
                                <div class="stat-item error"><span>失败</span><strong id="statFailed">0</strong></div>
                                <div class="stat-item pending"><span>待处理</span><strong id="statPending">0</strong></div>
                                <div class="stat-item active"><span>窗口</span><strong id="statActive">0</strong></div>
                            </div>
                        </section>

                        <section class="work-section export-section">
                            <div class="section-heading compact-heading">
                                <div>
                                    <h2>导出结果</h2>
                                    <p id="dataCount">已抓取 0 条</p>
                                </div>
                            </div>
                            <div class="export-group">
                                <button id="exportCsv" class="btn btn-success" type="button">导出 CSV</button>
                                <button id="exportJson" class="btn btn-secondary" type="button">导出 JSON</button>
                                <button id="clearData" class="btn btn-quiet" type="button">清空数据</button>
                            </div>
                        </section>
                    </aside>
                </div>

                <details class="service-settings">
                    <summary>授权服务设置</summary>
                    <label>服务地址
                        <input id="alexaLicenseApiUrl" type="url" placeholder="http://127.0.0.1:8080">
                    </label>
                    <p>正式服务必须使用 HTTPS；只有本机调试允许 localhost 或 127.0.0.1。</p>
                </details>
            </section>
        </main>
    </div>

    <input type="file" id="fileInput" accept=".txt,.csv" hidden>
    <script src="popup.js"></script>
</body>
</html>
