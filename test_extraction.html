<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Rufus 提取测试</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        h2 {
            margin: 0 0 12px;
            font-size: 16px;
        }

        #productTitle {
            display: block;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        #bylineInfo {
            display: inline-block;
            color: #2563eb;
            margin-bottom: 8px;
        }

        .rufus-module {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .rufus-heading {
            width: 100%;
            font-weight: 700;
            color: #111827;
        }

        .rufus-chip {
            border: 0;
            border-radius: 999px;
            padding: 8px 14px;
            background: #dff1ff;
            color: #125a9c;
            font-size: 14px;
            cursor: pointer;
        }

        .rufus-chip:hover {
            background: #cde9ff;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #111827;
            color: #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin: 0;
            min-height: 180px;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .primary {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="panel">
            <h1>Amazon Rufus 提取测试</h1>
            <p>本页模拟 Amazon 商品页中的 Ask Rufus 区块，用于验证按钮文案提取规则。</p>
        </div>

        <div class="panel">
            <span id="productTitle">Lightdot 4Pack 200W LED Wall Pack Lights</span>
            <a id="bylineInfo" href="#">Visit the Lightdot Store</a>
            <div id="acrPopover" aria-label="4.3 out of 5 stars">
                <span class="a-icon-alt">4.3 out of 5 stars</span>
            </div>
            <span id="acrCustomerReviewText">102 ratings</span>
            <input id="ASIN" name="ASIN" type="hidden" value="B0D2R3KRFN">
        </div>

        <div class="panel" id="rufus-price-ingress" data-csa-c-content-id="rufus-price-ingress-desktop">
            <span class="aok-align-center price-insights-ingress-desktop-text normal">High price</span>
        </div>

        <div class="panel" id="dpx-nice-widget-container" data-blue-request-id="XQO1UWOQF3091MQM4NB7">
            <script type="a-state" data-a-state='{"key":"dpx-nice-state"}'>
                {"marketplaceId":"ATVPDKIKX0DER","asin":"B0D2R3KRFN","locale":"en_US"}
            </script>
            <h5 class="rufus-heading">Ask Rufus</h5>
            <ul class="dpx-smidget-desktop-pill-list" role="list">
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Can%20it%20withstand%20harsh%20weather%3F","query":"Can it withstand harsh weather?"}'>
                        <button class="small-widget-pill rufus-chip"><span>Can it withstand harsh weather?</span></button>
                    </span>
                </li>
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Does%20it%20have%20a%20motion%20sensor%3F","query":"Does it have a motion sensor?"}'>
                        <button class="small-widget-pill rufus-chip"><span>Does it have a motion sensor?</span></button>
                    </span>
                </li>
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Is%20installation%20hardware%20included%3F","query":"Is installation hardware included?"}'>
                        <button class="small-widget-pill rufus-chip"><span>Is installation hardware included?</span></button>
                    </span>
                </li>
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Why%20you%20might%20like%20this","query":"Why you might like this"}'>
                        <button class="small-widget-pill rufus-chip"><span>Why you might like this</span></button>
                    </span>
                </li>
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Compare%20with%20similar%20items","query":"Compare with similar"}'>
                        <button class="small-widget-pill rufus-chip"><span>Compare with similar</span></button>
                    </span>
                </li>
                <li class="dpx-smidget-desktop-pill-list-item">
                    <span class="a-declarative" data-action="dpx-rufus-connect" data-dpx-rufus-connect='{"variant":"organic","actionUrl":"https://www.amazon.com/s?k=Ask+something+else","query":"Ask something else"}'>
                        <button class="small-widget-pill ask-pill rufus-chip"><span>Ask something else</span></button>
                    </span>
                </li>
            </ul>
        </div>

        <div class="panel">
            <h2>提取结果</h2>
            <pre id="result"></pre>
            <div class="actions">
                <button class="primary" id="runTest">重新提取</button>
            </div>
        </div>
    </div>

    <script>
        function cleanText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function isPromptText(text) {
            const normalized = cleanText(text);
            if (!normalized || normalized.length > 140) return false;
            if (/^Ask\s+Rufus$/i.test(normalized)) return false;
            if (/Ask\s+Rufus/i.test(normalized)) return false;
            if ((normalized.match(/\?/g) || []).length > 1) return false;

            const lower = normalized.toLowerCase();
            return normalized.endsWith('?') ||
                   lower === 'ask something else' ||
                   lower === 'compare with similar' ||
                   lower === 'why you might like this';
        }

        function extractDemoRufusData() {
            const prompts = [];
            const seen = new Set();

            function add(text) {
                const normalized = cleanText(text);
                const key = normalized.toLowerCase();
                if (isPromptText(normalized) && !seen.has(key)) {
                    seen.add(key);
                    prompts.push(normalized);
                }
            }

            function decodeHtmlEntities(value) {
                const textarea = document.createElement('textarea');
                textarea.innerHTML = String(value || '');
                return textarea.value;
            }

            function readQuery(element) {
                try {
                    const payload = JSON.parse(decodeHtmlEntities(element.getAttribute('data-dpx-rufus-connect')));
                    return payload.query || '';
                } catch (_) {
                    return '';
                }
            }

            document.querySelectorAll('#dpx-nice-widget-container [data-dpx-rufus-connect], #dpx-nice-widget-container .small-widget-pill')
                .forEach(element => {
                    add(readQuery(element));
                    add(readQuery(element.parentElement));
                    add(element.innerText || element.textContent);
                });

            const ratingMatch = cleanText(document.querySelector('#acrPopover')?.innerText)
                .match(/(\d+(?:\.\d+)?)\s+out\s+of\s+5/i);
            const reviewMatch = cleanText(document.querySelector('#acrCustomerReviewText')?.innerText)
                .match(/([\d,]+)\s+ratings?/i);
            const priceInsightLabel = cleanText(document.querySelector('#rufus-price-ingress .price-insights-ingress-desktop-text')?.innerText);

            return {
                asin: document.querySelector('#ASIN')?.value || '',
                productTitle: cleanText(document.querySelector('#productTitle')?.innerText),
                brand: cleanText(document.querySelector('#bylineInfo')?.innerText)
                    .replace(/^Visit the\s+/i, '')
                    .replace(/\s+Store$/i, ''),
                rating: ratingMatch ? ratingMatch[1] : '',
                reviewCount: reviewMatch ? reviewMatch[1] : '',
                priceInsightLabel,
                highPriceDetected: /^high\s+price$/i.test(priceInsightLabel),
                rufusTitle: prompts.length ? 'Ask Rufus' : '',
                rufusFound: prompts.length > 0,
                rufusPrompts: prompts,
                rufusQuestions: prompts.filter(prompt => prompt.endsWith('?')),
                rufusActions: prompts.filter(prompt => !prompt.endsWith('?')),
                askSomethingElsePresent: prompts.some(prompt => /^Ask something else$/i.test(prompt))
            };
        }

        function runTest() {
            document.getElementById('result').textContent = JSON.stringify(extractDemoRufusData(), null, 2);
        }

        document.getElementById('runTest').addEventListener('click', runTest);
        runTest();
    </script>
</body>
</html>
